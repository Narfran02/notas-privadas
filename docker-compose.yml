version: '3.8'

services:
  api:
    build:
      context: ./api
    ports:
      - "3000:3000"
    volumes:
      - dbsqlite:/data
    environment:
      - DB_DIR=/data
      - PORT=3000
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  dbsqlite:
